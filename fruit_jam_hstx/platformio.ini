; Fruit Jam HSTX 720p Demo — Arduino port (P0 toolchain check)
;
; Board:    Adafruit Fruit Jam (RP2350B, 8 MB QSPI PSRAM, HSTX DVI)
; Core:     earlephilhower's arduino-pico (the Adafruit Fruit Jam board
;           target lives there; not Adafruit's TinyUSB fork).
; Phase:    P0 — proves the toolchain wires up and a blank sketch
;           builds + flashes + boots with serial output.
; Phases >= P1 add: HSTX 720p framebuffer, audio, USB host keyboard, etc.

[env:adafruit_fruitjam]
platform = https://github.com/maxgerhardt/platform-raspberrypi.git
board = adafruit_fruitjam
framework = arduino
board_build.core = earlephilhower
board_build.filesystem_size = 4m   ; reserve 4 MB for LittleFS — used in P6+
upload_protocol = picotool
monitor_speed = 115200
monitor_filters = direct
build_flags =
  ; Phase 0: no custom flags yet. Phase >= 1 will add HSTX-specific defines
  ; (e.g. -DDEMO_MODE_TRIPLED_320=1) and pull in the vendored Doom HSTX
  ; framebuffer driver under src/hstx_fb/.
