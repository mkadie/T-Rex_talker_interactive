# ======================================================================
#  Communication Game configuration
#
#  Sidecar config for stim_games/aac_trainer.py.
#
#  Question / Answer pairs drive the round. The player hears the prompt
#  spoken aloud, then must navigate to and select the AAC item whose
#  `id` matches the answer. An answer can be a single id ("bathroom")
#  or a slash-separated PATH that walks through submenus
#  ("more/banana") — the game dives into each submenu when the
#  player picks the matching item.
#
#  This file is built around the CYD_PLUS 4x2 menus:
#      base.menu  -> thirsty, hungry, more, bathroom, stinky, yes, no, please
#          more -> food.menu
#                  -> water, juice, apple, milk, banana, cracker, yogurt, back
#
#  Five direct answers (base menu items with a sound) + five food items
#  reached via "more" gives the player realistic submenu-navigation
#  practice in a single 10-question round.
# ======================================================================

# Top-level menu the game starts on.
answer_menu = base.menu

# Number of questions per round (clamped to the number of [question]
# sections defined below).
rounds = 5

# Shuffle question order each time the game starts. Set to false for a
# deterministic order — useful when training a specific user.
randomize = true

# Penalty added to the total round time, in seconds, for each wrong
# answer. The round timer pauses during every audio playback so the
# player isn't penalised for synthesized-speech latency.
penalty_seconds = 30

# How long the player must hold the single-button / puff to exit the
# game (seconds).
exit_hold_sec = 3.0

# Double-tap window for "select" when using a single-button / puff
# (seconds).
double_tap_sec = 0.45

# Single-button auto-repeat behaviour: the first repeat fires after
# hold_first_ms; subsequent repeats accelerate by multiplying the
# interval by hold_decay, clamped to hold_min_ms.
hold_first_ms = 450
hold_min_ms   = 60
hold_decay    = 0.85

# Framing sounds. Leave blank to skip.
intro_sound   = /sounds/trainer/welcome.mp3
correct_sound = /sounds/trainer/correct.mp3
wrong_sound   = /sounds/trainer/try_again.mp3
done_sound    = /sounds/trainer/finished.mp3


# ----------------------------------------------------------------------
#  Round Questions
#
#  Each [question] section has:
#    prompt — audio file played to ask the question
#    answer — a menu item id, OR a slash-separated path through submenus
#
#  All ids referenced below exist in base.menu / food.menu (CYD_PLUS
#  4x2 layout). To regenerate the prompt MP3s, run:
#      python tools/make_trainer_sounds.py
# ----------------------------------------------------------------------

# --- 5 direct answers from base.menu ---

[question]
# Hold-the-door scenario for "Please" (thank you / please)
prompt = /sounds/trainer/someone_held_the_door.mp3
answer = please

[question]
# Bad smell scenario for "Stinky"
prompt = /sounds/trainer/bad_smell_making_me_angry.mp3
answer = stinky

[question]
# User's literal example for the bathroom button
prompt = /sounds/trainer/i_need_to_number_one.mp3
answer = bathroom

[question]
# Affirmative scenario for "Yes"
prompt = /sounds/trainer/want_to_go_to_the_park.mp3
answer = yes

[question]
# Negative scenario for "No"
prompt = /sounds/trainer/want_to_eat_broccoli.mp3
answer = no


# --- 5 food answers reached via the "more" button ---

[question]
prompt = /sounds/trainer/im_thirsty_want_water.mp3
answer = more/water

[question]
prompt = /sounds/trainer/want_a_crunchy_red_apple.mp3
answer = more/apple

[question]
prompt = /sounds/trainer/want_a_cold_glass_of_milk.mp3
answer = more/milk

[question]
# User's literal example — kept verbatim
prompt = /sounds/trainer/want_a_banana_only_a_banana.mp3
answer = more/banana

[question]
prompt = /sounds/trainer/a_little_hungry_just_a_cracker.mp3
answer = more/cracker
