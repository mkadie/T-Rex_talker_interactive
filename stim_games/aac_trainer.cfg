# ======================================================================
#  AAC Trainer — "Chicken Challenge" configuration
#
#  Sidecar config for stim_games/aac_trainer.py.
#  Loaded automatically when the game starts.
#
#  Question/Answer pairs drive the round. The player hears the Question
#  prompt spoken aloud, then must navigate to and select the AAC item
#  whose `id` matches Answer. The answer ids must exist in the menu
#  referenced by `answer_menu` (default: trainer.menu — included in
#  /menus/ alongside the game).
#
#  See Version3/SipAndPuff/T-Rex_Sip_N_Puff.md §3 "Maker Faire
#  Engagement: The Chicken Challenge Game" for the gameplay spec.
#
#  All prompt paths are relative to /menus unless they start with "/"
#  (same rule as action.py). The trainer's sound-generation script
#  (make_trainer_sounds.py) can produce the default set.
# ======================================================================

# Menu that supplies the pool of AAC items the player can choose from.
# Must exist under /menus/. Default: trainer.menu (bundled with the game).
answer_menu = trainer.menu

# Number of questions per round
rounds = 10

# Added to the total time, in seconds, for each wrong answer
penalty_seconds = 30

# How long the player must hold the single-button/puff to exit (seconds)
exit_hold_sec = 3.0

# Double-tap window for "select" when using a single-button/puff (seconds)
double_tap_sec = 0.45

# Single-button auto-repeat behaviour: the first repeat fires after
# hold_first_ms, subsequent repeats accelerate by multiplying the
# interval by hold_decay, clamped to hold_min_ms.
hold_first_ms = 450
hold_min_ms = 60
hold_decay = 0.85

# Framing sounds. Leave blank to skip.
intro_sound   = /sounds/trainer/welcome.mp3
correct_sound = /sounds/trainer/correct.mp3
wrong_sound   = /sounds/trainer/try_again.mp3
done_sound    = /sounds/trainer/finished.mp3

# ----------------------------------------------------------------------
#  Round Questions
#
#  Each [question] section has:
#    prompt  — audio file played to ask the question
#    answer  — the id (bracket name) of the correct AAC menu item
#
#  All answer ids below exist in the bundled trainer.menu.
# ----------------------------------------------------------------------

[question]
prompt = /sounds/trainer/you_are_thirsty.mp3
answer = water

[question]
prompt = /sounds/trainer/you_are_hungry.mp3
answer = hungry

[question]
prompt = /sounds/trainer/you_drank_too_much_soda.mp3
answer = bathroom

[question]
prompt = /sounds/trainer/the_dog_made_a_mess.mp3
answer = stinky

[question]
prompt = /sounds/trainer/do_you_want_ice_cream.mp3
answer = yes

[question]
prompt = /sounds/trainer/do_you_want_broccoli.mp3
answer = no

[question]
prompt = /sounds/trainer/you_want_a_sweet_drink.mp3
answer = juice

[question]
prompt = /sounds/trainer/you_want_something_cold_and_white.mp3
answer = milk

[question]
prompt = /sounds/trainer/you_finished_your_snack.mp3
answer = more

[question]
prompt = /sounds/trainer/someone_helped_you.mp3
answer = please
